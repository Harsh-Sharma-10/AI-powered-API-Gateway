server:
  port: 8080

spring:
  application:
    name: ai-api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/products/**

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: health-service
          uri: http://localhost:8081
          predicates:
            - Path=/health

# Gateway Configuration
gateway:
  ratelimit:
    requests-per-minute: 60
    burst-threshold: 100
    window-size-seconds: 60

  analysis:
    enabled: true
    suspicious-user-agents: python-requests,curl,wget,scrapy,bot,spider,crawler

  logging:
    verbose: true

  # ⭐ NEW: AI Service Configuration
  ai:
    enabled: true                        # Enable/disable AI integration
    service-url: http://localhost:8000   # AI service URL
    endpoint: /predict                   # AI prediction endpoint
    timeout-ms: 2000                     # Request timeout (2 seconds)
    fallback-on-error: ALLOW            # What to do if AI service fails (ALLOW or BLOCK)
    use-cache: true                      # Cache AI decisions
    cache-ttl-seconds: 60               # Cache duration

# Logging Configuration
logging:
  level:
    root: INFO
    com.apigateway.gatewayservice: DEBUG
    org.springframework.cloud.gateway: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"